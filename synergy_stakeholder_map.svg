<svg width="760" height="500" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Synergy Enterprises HR transformation stakeholder map</title>
<desc>Hierarchical stakeholder map showing the Executive Sponsor at the top, flowing down through the CHRO, into four parallel functions (HR Operations, IT Leadership, Compliance, and Data Privacy and Legal), converging at the Project Manager, then branching to HR Users, System Vendors, Regional HR Teams, and Regional Works Councils, ending at Employees.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#1f2a44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="760" height="500" fill="#ffffff"/>

<g>
<rect x="290" y="20" width="180" height="44" rx="8" fill="#eef0fa" stroke="#5b4b8a" stroke-width="0.5"/>
<text x="380" y="42" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2a44">Executive Sponsor</text>
</g>
<line x1="380" y1="64" x2="380" y2="100" stroke="#1f2a44" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="280" y="100" width="200" height="44" rx="8" fill="#eef0fa" stroke="#5b4b8a" stroke-width="0.5"/>
