</g>

<line x1="380" y1="416" x2="380" y2="438" stroke="#1f2a44" stroke-width="1" marker-end="url(#arrow)"/>
<text x="380" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2a44">Employees (end users)</text>
<text x="380" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#777">HRIS vendor and external auditors engage at the executive and compliance level (not shown for clarity)</text>
