<line x1="670" y1="166" x2="670" y2="186" stroke="#1f2a44" stroke-width="1" marker-end="url(#arrow)"/>

<g>
<rect x="20" y="186" width="140" height="56" rx="8" fill="#e6f5f2" stroke="#2f8f7d" stroke-width="0.5"/>
